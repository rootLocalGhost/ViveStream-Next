name: Build and Release

on:
  push:
    branches:
      - main
    paths:
      - "VERSION"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., 0.3.0). Must match file versions."
        required: false
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    uses: ./.github/workflows/test.yml

  release:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Versions Match
        id: version_check
        shell: bash
        run: |
          VERSION=$(cat VERSION | tr -d '\n\r ')
          PKG_VERSION=$(jq -r .version package.json)
          TAURI_VERSION=$(jq -r .version src-tauri/tauri.conf.json)
          echo "VERSION file: $VERSION"
          echo "package.json: $PKG_VERSION"
          echo "tauri.conf.json: $TAURI_VERSION"
          if [ "$VERSION" != "$PKG_VERSION" ] || [ "$VERSION" != "$TAURI_VERSION" ]; then
            echo "::error::Internal version mismatch detected! Check VERSION, package.json, and tauri.conf.json."
            exit 1
          fi
          INPUT_TAG="${{ github.event.inputs.tag }}"
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "$INPUT_TAG" ]; then
            CLEAN_INPUT_TAG=${INPUT_TAG#v}
            if [ "$CLEAN_INPUT_TAG" != "$VERSION" ]; then
              echo "::error::Manual trigger tag (v$CLEAN_INPUT_TAG) does not match internal file versions (v$VERSION). Build aborted."
              exit 1
            fi
            echo "Manual tag verified against file versions."
          fi
          echo "app_version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate Release Notes
        id: generate_notes
        shell: bash
        run: |
          echo "release_body<<EOF" >> $GITHUB_OUTPUT
          echo "ViveStream v${{ steps.version_check.outputs.app_version }}" >> $GITHUB_OUTPUT
          echo "==========================================" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "A new version of ViveStream is now available." >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "Security Notice (Unknown Publisher)" >> $GITHUB_OUTPUT
          echo "---------------------------------" >> $GITHUB_OUTPUT
          echo "ViveStream is a non-commercial open-source project. We do not purchase corporate code-signing certificates. Your operating system may flag the installer as coming from an Unknown Publisher." >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "- Windows: Click 'More Info' -> 'Run Anyway' in Defender SmartScreen." >> $GITHUB_OUTPUT
          echo "- Linux: Right-click the binary -> Properties -> Check 'Allow executing file as program'." >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "Changelog" >> $GITHUB_OUTPUT
          echo "---------" >> $GITHUB_OUTPUT
          git log -15 --pretty=format:"* %s (%h)" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf squashfs-tools libfuse2 binutils zstd tar

      - name: Install frontend dependencies
        run: bun install

      - name: Build and Release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ steps.version_check.outputs.app_version }}
          releaseName: "ViveStream v${{ steps.version_check.outputs.app_version }}"
          releaseBody: ${{ steps.generate_notes.outputs.release_body }}
          releaseDraft: true
          prerelease: false

      - name: Generate Arch Linux Package (.pkg.tar.zst)
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          DEB_FILE=$(find src-tauri/target/release/bundle/deb -name "*.deb" | head -n 1)
          if [ -z "$DEB_FILE" ]; then
            echo "::error::.deb package not found. Cannot generate Arch package."
            exit 1
          fi
          echo "Generating Arch package from $DEB_FILE..."

          mkdir arch_build
          cd arch_build
          ar x "../$DEB_FILE"

          tar -xf data.tar.*
          rm -f control.tar.* data.tar.* debian-binary

          SIZE=$(du -sb . | awk '{print $1}')

          cat <<EOT > .PKGINFO
          pkgname = vivestream-next-bin
          pkgbase = vivestream-next-bin
          pkgver = ${{ steps.version_check.outputs.app_version }}-1
          pkgdesc = A lightning-fast, natively integrated YouTube downloader and local media library.
          url = https://github.com/rootlocalghost/ViveStream-Next
          builddate = $(date +%s)
          packager = ViveStream CI <noreply@github.com>
          size = $SIZE
          arch = x86_64
          license = custom:PolyForm Noncommercial 1.0.0
          depend = webkit2gtk-4.1
          depend = yt-dlp
          depend = ffmpeg
          depend = intel-media-driver
          depend = libva-utils
          EOT

          ARCH_PKG_NAME="vivestream-next_${{ steps.version_check.outputs.app_version }}_x86_64.pkg.tar.zst"
          tar -c --zstd -f "../$ARCH_PKG_NAME" .

          gh release upload v${{ steps.version_check.outputs.app_version }} "../$ARCH_PKG_NAME" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
