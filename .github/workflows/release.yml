name: Build and Release

on:
  push:
    branches:
      - main
    paths:
      - "VERSION"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., 0.3.0). Must match file versions."
        required: false
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Versions Match
        id: version_check
        shell: bash
        run: |
          VERSION=$(cat VERSION | tr -d '\n\r ')
          PKG_VERSION=$(jq -r .version package.json)
          TAURI_VERSION=$(jq -r .version src-tauri/tauri.conf.json)

          echo "VERSION file: $VERSION"
          echo "package.json: $PKG_VERSION"
          echo "tauri.conf.json: $TAURI_VERSION"

          # 1. Verify internal files match each other
          if [ "$VERSION" != "$PKG_VERSION" ] || [ "$VERSION" != "$TAURI_VERSION" ]; then
            echo "::error::Internal version mismatch detected! Check VERSION, package.json, and tauri.conf.json."
            exit 1
          fi

          # 2. If triggered manually, verify the input tag matches the files
          INPUT_TAG="${{ github.event.inputs.tag }}"
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "$INPUT_TAG" ]; then
            CLEAN_INPUT_TAG=${INPUT_TAG#v}
            if [ "$CLEAN_INPUT_TAG" != "$VERSION" ]; then
              echo "::error::Manual trigger tag (v$CLEAN_INPUT_TAG) does not match internal file versions (v$VERSION). Build aborted."
              exit 1
            fi
            echo "Manual tag verified against file versions."
          fi

          echo "app_version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate Auto-Release Notes
        id: generate_notes
        shell: bash
        run: |
          echo "release_body<<EOF" >> $GITHUB_OUTPUT
          echo "🎉🚀✨ **Welcome to ViveStream v${{ steps.version_check.outputs.app_version }}!** ✨🚀🎉" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "Your lightning-fast, hardware-accelerated media client just got better! 🎬⚡" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### ⚠️ Important: Installation Warnings 🛡️" >> $GITHUB_OUTPUT
          echo "ViveStream is a completely free, PolyForm Noncommercial open-source project. Because we don't monetize you, we do not pay the extortionate yearly fees required for corporate Microsoft/Apple code-signing certificates. 💸🚫" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "As a result, your operating system will flag the installer as coming from an **Unknown Publisher**. This is a standard security prompt for unsigned binaries." >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "👉 **How to bypass the warnings:**" >> $GITHUB_OUTPUT
          echo "- 🪟 **Windows Defender SmartScreen:** Click **More Info** ➡️ then click **Run Anyway**." >> $GITHUB_OUTPUT
          echo "- 🐧 **Linux:** If your desktop environment blocks the AppImage/binary, right-click it, go to Properties, and check **Allow executing file as program** (or run \`chmod +x\` in terminal)." >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### 📦 Automated Changelog 📝" >> $GITHUB_OUTPUT
          git log -15 --pretty=format:"* %s (%h) 🛠️" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf squashfs-tools libfuse2

      - name: Install frontend dependencies
        run: bun install

      - name: Build and Release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ steps.version_check.outputs.app_version }}
          releaseName: "ViveStream v${{ steps.version_check.outputs.app_version }}"
          releaseBody: ${{ steps.generate_notes.outputs.release_body }}
          releaseDraft: true
          prerelease: false
